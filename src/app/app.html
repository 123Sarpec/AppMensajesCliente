<div class="card bg-base-100 w-1/2 mx-auto p-10">

  <h1 class="text-3xl font-bold text-center">
    {{title}}
  </h1>

  <ul class="list">
    @for (Miembro of Miembros(); track Miembro.id) {
    <li class="list-row items-center">
      <img src="/usuario.png" alt="user" class="w-10 h-10 rounded-full" />
      <!-- {{Miembro.id}} - {{Miembro.nombre}} - {{Miembro.email}} -->
      <div class="flex-1 text-left">
        <h2 class="text-lg font-bold">
          {{Miembro.nombre}}
        </h2>

      </div>
    </li>
    }
  </ul>

</div>
