<div class=" flex justify-center items-center p-4">
    <div class="card bg-base-100 w-full max-w-md shadow-xl p-6">
        <div class="card-title justify-center text-3xl mb-4">
            Registrte para poder usar ChatBlest
        </div>
        <div class=" card-body p-0">
            <form #loginForm="ngForm" class=" flex flex-col gap-4 w-full"
                (ngSubmit)="registrar()">
                <input type="text" class="input w-full" placeholder="Tu Email"
                    [(ngModel)]="credenciales.email" name="email">

                <input type="text" class="input w-full" placeholder="Tu Nombre"
                    [(ngModel)]="credenciales.nombre" name="nombre">

                <input type="password" class="input w-full"
                    placeholder="Tu Contraseña"
                    [(ngModel)]="credenciales.password"
                    name="password">
                <!-- <select name="miembro"
                    class="select w-full">
                    <option disabled selected>Elige un Miembro</option>
                    @for (miembro of MiembrosFormsHome(); track $index) {
                    <option value="{{miembro.id}}">{{miembro.nombre}}</option>
                    }
                </select> -->

                <div class="flex flex-col sm:w-auto mt-2 gap-3">
                    <button type="button" (click)="cancelar()"
                        class="btn">Cancelar</button>
                    <button type="submit"
                        class="btn btn-primary">Registrar</button>
                </div>
            </form>
        </div>
    </div>
</div>
